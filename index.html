<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Environment Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --accent: #f43f5e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #64748b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .card-value {
            font-size: 3rem;
            font-weight: 700;
        }

        .unit {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .progress-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 1rem;
        }

        .progress-bar {
            height: 100%;
            border-radius: 4px;
            background: #6366f1;
            transition: width 0.5s;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            height: 350px;
        }

        .table-container {
            margin-top: 2rem;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .status-on {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status-off {
            background: rgba(244, 63, 94, 0.2);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Environment Monitor</h1>
            <div class="status-indicator">
                <div class="dot" id="connection-dot"></div>
                <span id="connection-status">Connecting...</span>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-header"><span class="card-title">Temperature</span><span>🌡️</span></div>
                <div class="card-value"><span id="current-temp">--</span><span class="unit">°C</span></div>
                <div class="progress-container">
                    <div id="temp-progress" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">Humidity</span><span>💧</span></div>
                <div class="card-value"><span id="current-hum">--</span><span class="unit">%</span></div>
                <div class="progress-container">
                    <div id="hum-progress" class="progress-bar" style="width: 0%; background: #a855f7;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">LED Status</span><span>💡</span></div>
                <div class="card-value" id="led-text">OFF</div>
                <div id="led-indicator" style="height: 8px; border-radius: 4px; margin-top: 1rem; background: #475569;">
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card"><canvas id="tempChart"></canvas></div>
            <div class="chart-card"><canvas id="humChart"></canvas></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Temp</th>
                        <th>Hum</th>
                        <th>LED</th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // --- 1. CONFIGURATION (โหลดจาก config.js) ---
        // MQTT_CONFIG ถูกดึงมาจากไฟล์ config.js แล้ว

        let tempChart, humChart;
        let historyData = [];
        const MAX_HISTORY = 10;
        let client;

        // --- 2. MQTT LOGIC ---
        function initMQTT() {
            client = new Paho.MQTT.Client(MQTT_CONFIG.hostname, MQTT_CONFIG.port, MQTT_CONFIG.path, MQTT_CONFIG.clientId);

            client.onConnectionLost = (resp) => {
                document.getElementById('connection-status').textContent = "Disconnected";
                document.getElementById('connection-dot').style.backgroundColor = "#f43f5e";
                setTimeout(initMQTT, 5000);
            };

            client.onMessageArrived = (message) => {
                console.log("Data Arrived:", message.payloadString);
                try {
                    const data = JSON.parse(message.payloadString);
                    data.time = new Date().toLocaleTimeString();

                    historyData.push(data);
                    if (historyData.length > MAX_HISTORY) historyData.shift();

                    updateUI(data);
                } catch (e) { console.error("JSON Parse Error"); }
            };

            const options = {
                useSSL: true,
                userName: MQTT_CONFIG.username,
                password: MQTT_CONFIG.password,
                onSuccess: () => {
                    document.getElementById('connection-status').textContent = "Connected (MQTT)";
                    document.getElementById('connection-dot').style.backgroundColor = "#22c55e";
                    client.subscribe(MQTT_CONFIG.topic);
                },
                onFailure: (err) => {
                    document.getElementById('connection-status').textContent = "Fail: " + err.errorMessage;
                }
            };
            client.connect(options);
        }

        // --- 3. UI & CHART LOGIC ---
        function updateUI(data) {
            // Update Text
            if (data.temp) {
                document.getElementById('current-temp').textContent = data.temp;
                document.getElementById('temp-progress').style.width = (data.temp * 2) + "%";
            }
            if (data.hum) {
                document.getElementById('current-hum').textContent = data.hum;
                document.getElementById('hum-progress').style.width = data.hum + "%";
            }

            // Update LED
            const ledStatus = data.led || data.status;
            const ledText = document.getElementById('led-text');
            const ledBar = document.getElementById('led-indicator');
            if (ledStatus === "ON") {
                ledText.textContent = "ON"; ledText.style.color = "#22c55e";
                ledBar.style.background = "#22c55e";
            } else {
                ledText.textContent = "OFF"; ledText.style.color = "#ffffff";
                ledBar.style.background = "#475569";
            }

            // Update Table
            const tbody = document.getElementById('data-table-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${data.time}</td><td>${data.temp}°C</td><td>${data.hum}%</td><td><span class="status-badge ${ledStatus === 'ON' ? 'status-on' : 'status-off'}">${ledStatus}</span></td>`;
            tbody.prepend(tr);
            if (tbody.rows.length > MAX_HISTORY) tbody.deleteRow(MAX_HISTORY);

            // Update Charts
            updateCharts();
        }

        function initCharts() {
            const commonOptions = {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' } }, x: { display: false } },
                plugins: { legend: { display: false } }
            };
            tempChart = new Chart(document.getElementById('tempChart'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#6366f1', tension: 0.4 }] },
                options: commonOptions
            });
            humChart = new Chart(document.getElementById('humChart'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Hum', data: [], borderColor: '#a855f7', tension: 0.4 }] },
                options: commonOptions
            });
        }

        function updateCharts() {
            const labels = historyData.map(d => d.time);
            tempChart.data.labels = labels;
            tempChart.data.datasets[0].data = historyData.map(d => d.temp);
            tempChart.update();

            humChart.data.labels = labels;
            humChart.data.datasets[0].data = historyData.map(d => d.hum);
            humChart.update();
        }

        // Start
        initCharts();
        initMQTT();
    </script>
</body>

</html>
